<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Dashboard v2</title>
    <style id="theme-vars">
/*
  Studio Dashboard — Brand Design Tokens
  2-color system: Paper #F0EBDE + Ink #1F2BE0
  Ink tints: divider rgba(31,43,224,0.18), grid rgba(31,43,224,0.10)
  Aspect: MacBook desktop (1440×900)
*/
:root {
  /* ── Brand Identity (2-color: Paper + Ink) ── */
  --studio-background: #F0EBDE;
  --studio-foreground: #1F2BE0;
  --studio-card: #F0EBDE;
  --studio-card-foreground: #1F2BE0;
  --studio-primary: #1F2BE0;
  --studio-primary-foreground: #F0EBDE;
  --studio-muted: rgba(31,43,224,0.10);
  --studio-muted-foreground: rgba(31,43,224,0.55);
  --studio-border: rgba(31,43,224,0.18);
  --studio-input: #F0EBDE;
  --studio-ring: #1F2BE0;

  /* ── Semantic aliases (required by fill-html-head.mjs) ── */
  --studio-popover: #F0EBDE;
  --studio-popover-foreground: #1F2BE0;

  /* ── State colors (ink-tinted) ── */
  --studio-state-success: #1F6B3A;
  --studio-state-warning: #B88A2C;
  --studio-state-error: #B83A3A;
  --studio-state-info: #1F2BE0;

  /* ── Tab accent colors (ink opacity scale, 5 steps) ── */
  --tab-1: rgba(31,43,224,0.08);
  --tab-2: rgba(31,43,224,0.14);
  --tab-3: rgba(31,43,224,0.22);
  --tab-4: rgba(31,43,224,0.30);
  --tab-5: rgba(31,43,224,0.40);

  /* ── Radius scale ── */
  --studio-radius-sm: 6px;
  --studio-radius-md: 12px;
  --studio-radius-lg: 16px;

  /* ── Typography — English: Space Grotesk ── */
  --font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  --font-display-weight: 700;

  /* ── Typography — Chinese: Noto Sans SC ── */
  --font-body: 'Noto Sans SC', 'Space Grotesk', system-ui, sans-serif;
  --font-body-weight: 400;

  /* ── Line art stroke width ── */
  --stroke-default: 0.75px;
  --stroke-bold: 1px;
  --stroke-light: 0.5px;

  /* ── Divider & Grid tints ── */
  --ink-divider: rgba(31,43,224,0.18);
  --ink-grid: rgba(31,43,224,0.10);

  /* ── Spacing rhythm ── */
  --space-unit: 8px;
}

/* ── Dark mode (optional fallback, not primary) ── */
.dark {
  --studio-background: #1A1B2E;
  --studio-foreground: #F0EBDE;
  --studio-card: #22233A;
  --studio-card-foreground: #F0EBDE;
  --studio-primary: #F0EBDE;
  --studio-primary-foreground: #1A1B2E;
  --studio-muted: rgba(31,43,224,0.15);
  --studio-muted-foreground: rgba(240,235,222,0.6);
  --studio-border: rgba(31,43,224,0.25);
  --studio-input: #22233A;
  --studio-ring: #F0EBDE;
  --studio-popover: #22233A;
  --studio-popover-foreground: #F0EBDE;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--studio-background);
    --color-foreground: var(--studio-foreground);
    --color-card: var(--studio-card);
    --color-card-foreground: var(--studio-card-foreground);
    --color-popover: var(--studio-popover);
    --color-popover-foreground: var(--studio-popover-foreground);
    --color-primary: var(--studio-primary);
    --color-primary-foreground: var(--studio-primary-foreground);
    --color-muted: var(--studio-muted);
    --color-muted-foreground: var(--studio-muted-foreground);
    --color-border: var(--studio-border);
    --color-input: var(--studio-input);
    --color-ring: var(--studio-ring);
    --radius-sm: var(--studio-radius-sm);
    --radius-md: var(--studio-radius-md);
    --radius-lg: var(--studio-radius-lg);
  }
  @layer base {
    body { background: var(--studio-background); color: var(--studio-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style id="semantic-token-fallback">
      .bg-background { background-color: var(--studio-background); }
      .text-background { color: var(--studio-background); }
      .border-background { border-color: var(--studio-background); }
      .ring-background { --tw-ring-color: var(--studio-background); }
      .bg-foreground { background-color: var(--studio-foreground); }
      .text-foreground { color: var(--studio-foreground); }
      .border-foreground { border-color: var(--studio-foreground); }
      .ring-foreground { --tw-ring-color: var(--studio-foreground); }
      .bg-card { background-color: var(--studio-card); }
      .text-card { color: var(--studio-card); }
      .border-card { border-color: var(--studio-card); }
      .ring-card { --tw-ring-color: var(--studio-card); }
      .bg-card-foreground { background-color: var(--studio-card-foreground); }
      .text-card-foreground { color: var(--studio-card-foreground); }
      .border-card-foreground { border-color: var(--studio-card-foreground); }
      .ring-card-foreground { --tw-ring-color: var(--studio-card-foreground); }
      .bg-popover { background-color: var(--studio-popover); }
      .text-popover { color: var(--studio-popover); }
      .border-popover { border-color: var(--studio-popover); }
      .ring-popover { --tw-ring-color: var(--studio-popover); }
      .bg-popover-foreground { background-color: var(--studio-popover-foreground); }
      .text-popover-foreground { color: var(--studio-popover-foreground); }
      .border-popover-foreground { border-color: var(--studio-popover-foreground); }
      .ring-popover-foreground { --tw-ring-color: var(--studio-popover-foreground); }
      .bg-primary { background-color: var(--studio-primary); }
      .text-primary { color: var(--studio-primary); }
      .border-primary { border-color: var(--studio-primary); }
      .ring-primary { --tw-ring-color: var(--studio-primary); }
      .bg-primary-foreground { background-color: var(--studio-primary-foreground); }
      .text-primary-foreground { color: var(--studio-primary-foreground); }
      .border-primary-foreground { border-color: var(--studio-primary-foreground); }
      .ring-primary-foreground { --tw-ring-color: var(--studio-primary-foreground); }
      .bg-muted { background-color: var(--studio-muted); }
      .text-muted { color: var(--studio-muted); }
      .border-muted { border-color: var(--studio-muted); }
      .ring-muted { --tw-ring-color: var(--studio-muted); }
      .bg-muted-foreground { background-color: var(--studio-muted-foreground); }
      .text-muted-foreground { color: var(--studio-muted-foreground); }
      .border-muted-foreground { border-color: var(--studio-muted-foreground); }
      .ring-muted-foreground { --tw-ring-color: var(--studio-muted-foreground); }
      .bg-border { background-color: var(--studio-border); }
      .text-border { color: var(--studio-border); }
      .border-border { border-color: var(--studio-border); }
      .ring-border { --tw-ring-color: var(--studio-border); }
      .bg-input { background-color: var(--studio-input); }
      .text-input { color: var(--studio-input); }
      .border-input { border-color: var(--studio-input); }
      .ring-input { --tw-ring-color: var(--studio-input); }
      .bg-ring { background-color: var(--studio-ring); }
      .text-ring { color: var(--studio-ring); }
      .border-ring { border-color: var(--studio-ring); }
      .ring-ring { --tw-ring-color: var(--studio-ring); }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="h-screen overflow-hidden min-h-0 font-sans antialiased" style="background:var(--studio-background);color:var(--studio-foreground);">
    <main>
        <div class="flex flex-col h-full" data-viewport-mode="app-shell">

            <!-- ═══ Top Bar ═══ -->
            <header class="flex items-center justify-between px-6 py-3" style="border-bottom:0.75px solid var(--ink-divider);">
                <div class="flex items-center gap-3">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="var(--studio-foreground)" stroke-width="0.75" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="22" height="22" rx="3"/>
                        <line x1="8" y1="14" x2="20" y2="14"/>
                        <line x1="14" y1="8" x2="14" y2="20"/>
                    </svg>
                    <span style="font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:0.04em;">STUDIO</span>
                    <span style="font-family:var(--font-body);font-size:13px;color:var(--studio-muted-foreground);">工作室</span>
                </div>
                <div class="flex items-center gap-4">
                    <button class="relative p-1.5 rounded-md" style="color:var(--studio-muted-foreground);" aria-label="通知">
                        <i data-lucide="bell" style="width:18px;height:18px;"></i>
                        <span class="absolute top-1 right-1 w-2 h-2 rounded-full" style="background:var(--studio-foreground);"></span>
                    </button>
                    <div class="flex items-center gap-2.5">
                        <span style="font-family:var(--font-body);font-size:13px;color:var(--studio-muted-foreground);">翘 / Qiao</span>
                        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold" style="border:0.75px solid var(--studio-border);color:var(--studio-foreground);font-family:var(--font-display);">Q</div>
                    </div>
                </div>
            </header>

            <!-- ═══ Folder Tabs ═══ -->
            <nav class="flex px-6 pt-3" style="gap:2px;">
                <button class="px-4 py-2 text-xs rounded-t-md" style="background:var(--tab-1);border-bottom:0.75px solid var(--tab-1);font-family:var(--font-body);color:var(--studio-muted-foreground);">
                    <i data-lucide="layout-dashboard" style="width:13px;height:13px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>总览 / Overview
                </button>
                <button class="px-4 py-2 text-xs rounded-t-md" style="background:var(--tab-2);border-bottom:0.75px solid var(--tab-2);font-family:var(--font-body);color:var(--studio-muted-foreground);">
                    <i data-lucide="folder-open" style="width:13px;height:13px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>项目 / Projects
                </button>
                <button class="px-4 py-2 text-xs rounded-t-md" style="background:var(--tab-3);border-bottom:none;font-family:var(--font-body);color:var(--studio-foreground);font-weight:500;">
                    <i data-lucide="pen-tool" style="width:13px;height:13px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>创作 / Create
                </button>
                <button class="px-4 py-2 text-xs rounded-t-md" style="background:var(--tab-4);border-bottom:0.75px solid var(--tab-4);font-family:var(--font-body);color:var(--studio-muted-foreground);">
                    <i data-lucide="archive" style="width:13px;height:13px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>素材 / Assets
                </button>
                <button class="px-4 py-2 text-xs rounded-t-md" style="background:var(--tab-5);border-bottom:0.75px solid var(--tab-5);font-family:var(--font-body);color:var(--studio-muted-foreground);">
                    <i data-lucide="settings" style="width:13px;height:13px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>设置 / Settings
                </button>
            </nav>
            <div style="height:0.75px;background:var(--ink-divider);margin:0 24px;"></div>

            <!-- ═══ Content Area: v2 asymmetric layout ═══ -->
            <div class="flex-1 min-h-0 px-6 pt-5 pb-4 overflow-hidden" data-scroll-region="primary">
                <div class="flex gap-5 h-full">

                    <!-- LEFT: Illustration full height, thin border (55%) -->
                    <div class="relative flex flex-col" style="width:55%;">
                        <div class="flex-1 rounded-lg overflow-hidden" style="border:0.5px solid var(--studio-border);">
                            <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" data-b64-id="__b64_0" alt="工作室等距视图" class="w-full h-full object-cover" style="opacity:0.92;">
                        </div>
                        <div class="flex items-center justify-between mt-3 px-1">
                            <span style="font-family:var(--font-display);font-size:11px;letter-spacing:0.06em;color:var(--studio-muted-foreground);">ISO-VIEW / 工作室鸟瞰</span>
                            <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">2025.07</span>
                        </div>
                    </div>

                    <!-- RIGHT: Asymmetric card mosaic (45%) -->
                    <div class="flex flex-col" style="width:45%;gap:12px;">

                        <!-- Top: Wide card "Active Projects" -->
                        <div class="rounded-lg px-4 py-4" style="border:0.75px solid var(--studio-border);flex:1;">
                            <div class="flex items-center justify-between mb-2">
                                <span style="font-family:var(--font-body);font-size:12px;color:var(--studio-muted-foreground);">活跃项目 / Active Projects</span>
                                <i data-lucide="layers" style="width:14px;height:14px;color:var(--studio-muted-foreground);"></i>
                            </div>
                            <div style="font-family:var(--font-display);font-size:36px;font-weight:700;line-height:1;">12</div>
                            <div class="mt-2">
                                <div class="flex items-center gap-2 mb-1">
                                    <div class="w-2 h-2 rounded-full" style="background:var(--studio-foreground);opacity:0.6;"></div>
                                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">长篇小说 — 进度 72%</span>
                                </div>
                                <div class="flex items-center gap-2 mb-1">
                                    <div class="w-2 h-2 rounded-full" style="background:var(--studio-foreground);opacity:0.35;"></div>
                                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">知乎短篇 — 进度 45%</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 rounded-full" style="background:var(--studio-foreground);opacity:0.2;"></div>
                                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">AI短剧剧本 — 进度 18%</span>
                                </div>
                            </div>
                        </div>

                        <!-- Middle: 2 equal cards side by side -->
                        <div class="flex gap-3" style="flex:0.8;">
                            <!-- Card: 素材文件 -->
                            <div class="rounded-lg px-4 py-4 flex-1" style="border:0.75px solid var(--studio-border);">
                                <div class="flex items-center justify-between mb-2">
                                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">素材文件</span>
                                    <i data-lucide="image" style="width:13px;height:13px;color:var(--studio-muted-foreground);"></i>
                                </div>
                                <div style="font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1;">48</div>
                                <div class="mt-1.5" style="font-family:var(--font-body);font-size:10px;color:var(--studio-muted-foreground);">Assets</div>
                            </div>
                            <!-- Card: 进行中 -->
                            <div class="rounded-lg px-4 py-4 flex-1" style="border:0.75px solid var(--studio-border);">
                                <div class="flex items-center justify-between mb-2">
                                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">进行中</span>
                                    <i data-lucide="clock" style="width:13px;height:13px;color:var(--studio-muted-foreground);"></i>
                                </div>
                                <div style="font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1;">3</div>
                                <div class="mt-1.5" style="font-family:var(--font-body);font-size:10px;color:var(--studio-muted-foreground);">In Progress</div>
                            </div>
                        </div>

                        <!-- Bottom: Wide card "Completion Rate" -->
                        <div class="rounded-lg px-4 py-4" style="border:0.75px solid var(--studio-border);flex:0.7;">
                            <div class="flex items-center justify-between mb-2">
                                <span style="font-family:var(--font-body);font-size:12px;color:var(--studio-muted-foreground);">完成率 / Completion</span>
                                <i data-lucide="check-circle" style="width:14px;height:14px;color:var(--studio-muted-foreground);"></i>
                            </div>
                            <div class="flex items-end gap-2">
                                <div style="font-family:var(--font-display);font-size:36px;font-weight:700;line-height:1;">89</div>
                                <span style="font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--studio-muted-foreground);padding-bottom:2px;">%</span>
                            </div>
                            <!-- Thin progress bar -->
                            <div class="mt-3 rounded-full overflow-hidden" style="height:3px;background:var(--studio-muted);">
                                <div class="h-full rounded-full" style="width:89%;background:var(--studio-foreground);"></div>
                            </div>
                            <div class="flex justify-between mt-1.5">
                                <span style="font-family:var(--font-body);font-size:10px;color:var(--studio-muted-foreground);">已完成 89%</span>
                                <span style="font-family:var(--font-body);font-size:10px;color:var(--studio-muted-foreground);">目标 100%</span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- ═══ Bottom Activity Strip ═══ -->
            <footer class="px-6 py-2.5 flex items-center justify-between" style="border-top:0.75px solid var(--ink-divider);">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1.5">
                        <div class="w-1.5 h-1.5 rounded-full" style="background:var(--studio-foreground);"></div>
                        <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">最新动态: 完成了「短篇小说 - 第三章」的校对</span>
                    </div>
                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">·</span>
                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">3 小时前</span>
                </div>
                <div class="flex items-center gap-3">
                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">版本 v2.0</span>
                    <div class="w-px h-3" style="background:var(--ink-grid);"></div>
                    <span style="font-family:var(--font-body);font-size:11px;color:var(--studio-muted-foreground);">STUDIO 工作室</span>
                </div>
            </footer>

        </div>
